name: Build main-debug configurable signed APKs

on:
  workflow_dispatch:
    inputs:
      app_package_name:
        description: Android applicationId
        required: true
        default: com.lxwalnut.music.mobile
        type: string
      app_deep_link_scheme:
        description: Deep-link scheme
        required: true
        default: lxmusic
        type: string

permissions:
  contents: read

jobs:
  android:
    name: Build fixed-key signed APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Validate signing secrets
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          test -n "$SIGN_KEYSTORE_BASE64"
          test -n "$SIGN_STORE_PASSWORD"
          test -n "$SIGN_KEY_ALIAS"
          test -n "$SIGN_KEY_PASSWORD"

      - name: Restore signing key
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/app-release.keystore"

      - name: Generate JS identity
        env:
          APP_PACKAGE_NAME: ${{ inputs.app_package_name }}
          APP_DEEP_LINK_SCHEME: ${{ inputs.app_deep_link_scheme }}
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const identity = {
            packageName: process.env.APP_PACKAGE_NAME,
            providerAuthority: `${process.env.APP_PACKAGE_NAME}.provider`,
            widgetActionPrefix: `${process.env.APP_PACKAGE_NAME}.widget`,
            deepLinkScheme: process.env.APP_DEEP_LINK_SCHEME,
          }
          fs.writeFileSync('src/config/buildIdentity.ts', `export const BUILD_IDENTITY = ${JSON.stringify(identity, null, 2)} as const\n`)
          NODE

      - name: Build release APKs
        working-directory: android
        env:
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
          APP_PACKAGE_NAME: ${{ inputs.app_package_name }}
          APP_DEEP_LINK_SCHEME: ${{ inputs.app_deep_link_scheme }}
        run: |
          ./gradlew assembleRelease \
            "-PAPP_PACKAGE_NAME=$APP_PACKAGE_NAME" \
            "-PAPP_DEEP_LINK_SCHEME=$APP_DEEP_LINK_SCHEME" \
            "-PMYAPP_UPLOAD_STORE_FILE=$RUNNER_TEMP/app-release.keystore" \
            "-PMYAPP_UPLOAD_STORE_PASSWORD=$SIGN_STORE_PASSWORD" \
            "-PMYAPP_UPLOAD_KEY_ALIAS=$SIGN_KEY_ALIAS" \
            "-PMYAPP_UPLOAD_KEY_PASSWORD=$SIGN_KEY_PASSWORD"
