name: Build main-debug configurable signed APKs

on:
  workflow_dispatch:
    inputs:
      app_package_name:
        description: Android applicationId
        required: true
        default: com.lxwalnut.music.mobile
        type: string
      app_provider_authority:
        description: FileProvider authority; blank derives from applicationId
        required: false
        default: ''
        type: string
      app_widget_action_prefix:
        description: Widget broadcast prefix; blank derives from applicationId
        required: false
        default: ''
        type: string
      app_deep_link_scheme:
        description: Deep-link scheme
        required: true
        default: lxmusic
        type: string

permissions:
  contents: read

jobs:
  android:
    name: Build fixed-key signed APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Validate signing secrets
        shell: bash
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          test -n "$SIGN_KEYSTORE_BASE64" || { echo 'Missing SIGN_KEYSTORE_BASE64'; exit 1; }
          test -n "$SIGN_STORE_PASSWORD" || { echo 'Missing SIGN_STORE_PASSWORD'; exit 1; }
          test -n "$SIGN_KEY_ALIAS" || { echo 'Missing SIGN_KEY_ALIAS'; exit 1; }
          test -n "$SIGN_KEY_PASSWORD" || { echo 'Missing SIGN_KEY_PASSWORD'; exit 1; }

      - name: Restore fixed signing key
        shell: bash
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/app-release.keystore"

      - name: Resolve application identity
        id: identity
        shell: bash
        env:
          APP_PACKAGE_NAME: ${{ inputs.app_package_name }}
          APP_PROVIDER_AUTHORITY: ${{ inputs.app_provider_authority }}
          APP_WIDGET_ACTION_PREFIX: ${{ inputs.app_widget_action_prefix }}
          APP_DEEP_LINK_SCHEME: ${{ inputs.app_deep_link_scheme }}
        run: |
          [[ "$APP_PACKAGE_NAME" =~ ^[A-Za-z][A-Za-z0-9_]*(\.[A-Za-z][A-Za-z0-9_]*)+$ ]] || { echo 'Invalid applicationId'; exit 1; }
          [[ "$APP_DEEP_LINK_SCHEME" =~ ^[A-Za-z][A-Za-z0-9+.-]*$ ]] || { echo 'Invalid deep-link scheme'; exit 1; }
          provider="${APP_PROVIDER_AUTHORITY:-${APP_PACKAGE_NAME}.provider}"
          widget="${APP_WIDGET_ACTION_PREFIX:-${APP_PACKAGE_NAME}.widget}"
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "widget=$widget" >> "$GITHUB_OUTPUT"

      - name: Generate JavaScript build identity
        shell: bash
        env:
          APP_PACKAGE_NAME: ${{ inputs.app_package_name }}
          APP_PROVIDER_AUTHORITY: ${{ steps.identity.outputs.provider }}
          APP_WIDGET_ACTION_PREFIX: ${{ steps.identity.outputs.widget }}
          APP_DEEP_LINK_SCHEME: ${{ inputs.app_deep_link_scheme }}
        run: |
          cat > src/config/buildIdentity.ts <<EOF
          export const BUILD_IDENTITY = {
            packageName: '$APP_PACKAGE_NAME',
            providerAuthority: '$APP_PROVIDER_AUTHORITY',
            widgetActionPrefix: '$APP_WIDGET_ACTION_PREFIX',
            deepLinkScheme: '$APP_DEEP_LINK_SCHEME',
          } as const
          EOF

      - name: Build release APKs
        working-directory: android
        shell: bash
        env:
          DISABLE_SVG: 1
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PAPP_SOURCE_NAMESPACE=com.lxwalnut.music.mobile \
            -PAPP_PACKAGE_NAME='${{ inputs.app_package_name }}' \
            -PAPP_PROVIDER_AUTHORITY='${{ steps.identity.outputs.provider }}' \
            -PAPP_WIDGET_ACTION_PREFIX='${{ steps.identity.outputs.widget }}' \
            -PAPP_DEEP_LINK_SCHEME='${{ inputs.app_deep_link_scheme }}' \
            -PMYAPP_UPLOAD_STORE_FILE="$RUNNER_TEMP/app-release.keystore" \
            -PMYAPP_UPLOAD_STORE_PASSWORD="$SIGN_STORE_PASSWORD" \
            -PMYAPP_UPLOAD_KEY_ALIAS="$SIGN_KEY_ALIAS" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="$SIGN_KEY_PASSWORD"

      - name: List generated APKs
        if: always()
        shell: bash
        run: find android/app/build/outputs/apk -type f -name '*.apk' -print || true

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: main-debug-configurable-signed-apks
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
