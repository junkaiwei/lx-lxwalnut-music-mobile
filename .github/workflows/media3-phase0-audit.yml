name: Media3 Phase 0 Android audit

on:
  # GitHub only discovers workflow_dispatch files from the default branch.
  # Keep the workaround scoped to this audit branch so no other branch runs it.
  push:
    branches:
      - feat/media3-cold-resume
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-baseline:
    name: Android dependency and manifest baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Capture resolved Media3 dependency graph
        shell: bash
        run: |
          set -euo pipefail
          cd android
          chmod +x ./gradlew
          mkdir -p "$GITHUB_WORKSPACE/phase0-audit/dependencies"
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath \
            > "$GITHUB_WORKSPACE/phase0-audit/dependencies/debugRuntimeClasspath.txt"
          for module in common exoplayer session datasource datasource-okhttp ui exoplayer-dash exoplayer-hls exoplayer-smoothstreaming; do
            ./gradlew :app:dependencyInsight --configuration debugRuntimeClasspath \
              --dependency "androidx.media3:media3-$module" \
              > "$GITHUB_WORKSPACE/phase0-audit/dependencies/media3-$module.txt"
          done

      - name: Build Debug and generate merged manifest
        shell: bash
        run: |
          set -euo pipefail
          cd android
          ./gradlew :app:processDebugMainManifest :app:assembleDebug :app:testDebugUnitTest

      - name: Collect Phase 0 outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p phase0-audit/manifest phase0-audit/apk phase0-audit/tests
          find android/app/build/intermediates/merged_manifests/debug -name AndroidManifest.xml -exec cp {} phase0-audit/manifest/merged-debug-AndroidManifest.xml \;
          find android/app/build/outputs/apk/debug -name '*.apk' -exec cp {} phase0-audit/apk/ \;
          if [ -d android/app/build/reports/tests ]; then
            find android/app/build/reports/tests -type f -exec cp --parents {} phase0-audit/tests/ \;
          fi

      - name: Upload Phase 0 audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: media3-phase0-${{ github.sha }}
          path: phase0-audit
          if-no-files-found: error
