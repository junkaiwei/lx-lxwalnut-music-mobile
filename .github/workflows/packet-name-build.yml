name: Build packet-name APKs

on:
  push:
    branches:
      - build/packet-name
  workflow_dispatch:
    inputs:
      app_package_name:
        description: Android applicationId
        required: true
        default: com.luna.music
        type: string
      app_deep_link_scheme:
        description: Deep-link scheme
        required: true
        default: lxmusic
        type: string

permissions:
  contents: read

env:
  APP_PACKAGE_NAME: ${{ github.event.inputs.app_package_name || vars.APP_PACKAGE_NAME || 'com.luna.music' }}
  APP