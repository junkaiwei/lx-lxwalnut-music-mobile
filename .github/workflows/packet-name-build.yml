name: Build packet-name APKs
on:
  push:
    branches: [build/packet-name]
  workflow_dispatch:
    inputs:
      app_package_name:
        description: Android applicationId
        required: true
        default: com.luna.music
        type: string
permissions:
  contents: read
env:
  APP_PACKAGE_NAME: ${{ github.event.inputs.app_package_name || 'com.luna.music' }}
  APP_DEEP_LINK_SCHEME: lxmusic
jobs:
  android:
    name: Android fixed-signing build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Restore signing key
        env:
          KEYSTORE_B64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_B64"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/app-release.jks"
          test -s "$RUNNER_TEMP/app-release.jks"
      - name: Build release APKs
        working-directory: android
        env:
          STORE_PASS: ${{ secrets.SIGN_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          test -n "$STORE_PASS" && test -n "$KEY_ALIAS" && test -n "$KEY_PASS"
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            "-PAPP_PACKAGE_NAME=$APP_PACKAGE_NAME" \
            "-PAPP_DEEP_LINK_SCHEME=$APP_DEEP_LINK_SCHEME" \
            "-PMYAPP_UPLOAD_STORE_FILE=$RUNNER_TEMP/app-release.jks" \
            "-PMYAPP_UPLOAD_STORE_PASSWORD=$STORE_PASS" \
            "-PMYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS" \
            "-PMYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASS"
      - name: Verify APK package and certificate
        env:
          STORE_PASS: ${{ secrets.SIGN_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
        run: |
          tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          keytool -exportcert -keystore "$RUNNER_TEMP/app-release.jks" -storepass "$STORE_PASS" -alias "$KEY_ALIAS" -file "$RUNNER_TEMP/key.der"
          expected="$(sha256sum "$RUNNER_TEMP/key.der" | awk '{print $1}')"
          count=0
          while IFS= read -r -d '' apk; do
            count=$((count+1))
            "$tools/apksigner" verify "$apk"
            "$tools/aapt" dump badging "$apk" | grep -F "package: name='$APP_PACKAGE_NAME'"
            "$tools/apksigner" verify --print-certs-pem "$apk" > "$RUNNER_TEMP/apk.pem"
            openssl x509 -in "$RUNNER_TEMP/apk.pem" -outform DER -out "$RUNNER_TEMP/apk.der"
            actual="$(sha256sum "$RUNNER_TEMP/apk.der" | awk '{print $1}')"
            echo "APK: $apk"
            echo "Expected: $expected"
            echo "Actual:   $actual"
            test "$actual" = "$expected"
          done < <(find android/app/build/outputs/apk/release -name '*.apk' -print0)
          test "$count" -gt 0
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: packet-name-${{ env.APP_PACKAGE_NAME }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
