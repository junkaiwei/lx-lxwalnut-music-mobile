<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Sonic Topography</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('root');
        if (el) el.innerHTML = '<pre style="color:red;font-size:10px;padding:8px;white-space:pre-wrap;word-break:break-all;">ERROR: ' + msg + '\nLine: ' + line + ':' + col + '\nFile: ' + url + '\n' + (error && error.stack ? error.stack : '') + '</pre>';
        try { window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'log',message:'[ST-ERROR] '+msg+' L'+line+':'+col})); } catch(e){}
      };
      window.onunhandledrejection = function(e) {
        try { window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'log',message:'[ST-UNHANDLED] '+(e.reason||'')})); } catch(e2){}
      };
    </script>
    <link rel="stylesheet" href="./assets/main-BZ4--9QF.css">
    <script type="module" crossorigin src="./assets/main-CmwZ09fY.js"></script>

  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
