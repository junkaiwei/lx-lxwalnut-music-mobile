apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import com.android.build.OutputFile
import groovy.json.JsonSlurper

react {
}

def enableSeparateBuildPerCPUArchitecture = true
def enableProguardInReleaseBuilds = true
def jscFlavor = 'org.webkit:android-jsc:+'

def reactNativeArchitectures() {
    def value = project.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def packageJson = new JsonSlurper().parseText(new File("../package.json").text)
def verCode = packageJson["versionCode"]
def verName = packageJson["version"]
def applicationName = packageJson["name"]

def appSourceNamespace = project.findProperty("APP_SOURCE_NAMESPACE") ?: "com.lxwalnut.music.mobile"
def appPackageName = project.findProperty("APP_PACKAGE_NAME") ?: appSourceNamespace
def appProviderAuthority = project.findProperty("APP_PROVIDER_AUTHORITY") ?: "${appPackageName}.provider"
def appWidgetActionPrefix = project.findProperty("APP_WIDGET_ACTION_PREFIX") ?: "${appPackageName}.widget"
def appDeepLinkScheme = project.findProperty("APP_DEEP_LINK_SCHEME") ?: "lxmusic"

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace appSourceNamespace
    defaultConfig {
        applicationId appPackageName
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode verCode
        versionName verName
        manifestPlaceholders = [
            appProviderAuthority: appProviderAuthority,
            appWidgetActionPrefix: appWidgetActionPrefix,
            appDeepLinkScheme: appDeepLinkScheme,
        ]
        buildConfigField "String", "APP_PROVIDER_AUTHORITY", "\"${appProviderAuthority}\""
        buildConfigField "String", "APP_WIDGET_ACTION_PREFIX", "\"${appWidgetActionPrefix}\""
        buildConfigField "String", "APP_DEEP_LINK_SCHEME", "\"${appDeepLinkScheme}\""
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk true
            include (*reactNativeArchitectures())
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            } else {
                def keystorePropertiesFile = rootProject.file("keystore.properties")
                def keystoreProperties = new Properties()
                if (keystorePropertiesFile.exists()) {
                    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                }
                if (keystoreProperties.containsKey('MYAPP_UPLOAD_STORE_FILE')) {
                    storeFile file(keystoreProperties['MYAPP_UPLOAD_STORE_FILE'])
                    storePassword keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD']
                    keyAlias keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS']
                    keyPassword keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD']
                }
            }
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".dev"
        }
        release {
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
            def abi = output.getFilter(OutputFile.ABI)
            if (abi == null) {
                output.outputFileName = "${applicationName}-v${defaultConfig.versionName}-universal.apk"
            } else {
                output.versionCodeOverride = defaultConfig.versionCode * 1000 + versionCodes.get(abi)
                output.outputFileName = "${applicationName}-v${defaultConfig.versionName}-${abi}.apk"
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (System.getenv("NO_FLIPPER") != "1") {
        implementation("com.facebook.react:flipper-integration")
    }
    implementation 'wang.harlon.quickjs:wrapper-android:2.4.0'
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
