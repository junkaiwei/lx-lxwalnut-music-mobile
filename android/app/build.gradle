apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import com.android.build.OutputFile
import groovy.json.JsonOutput
import groovy.json.JsonSlurper

react {
}

def enableSeparateBuildPerCPUArchitecture = true
def enableProguardInReleaseBuilds = true
def jscFlavor = 'org.webkit:android-jsc:+'

def reactNativeArchitectures() {
    def value = project.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def packageJson = new JsonSlurper().parseText(new File("../package.json").text)
def verCode = packageJson["versionCode"]
def verName = packageJson["version"]
def applicationName = packageJson["name"]

// Java/Kotlin source packages remain fixed. Only the installed application ID is configurable.
def appPackageName = project.findProperty("APP_PACKAGE_NAME") ?: "com.lxwalnut.music.mobile"
def appProviderAuthority = project.findProperty("APP_PROVIDER_AUTHORITY") ?: "${appPackageName}.provider"
def appWidgetActionPrefix = project.findProperty("APP_WIDGET_ACTION_PREFIX") ?: "${appPackageName}.widget"
def appDeepLinkScheme = project.findProperty("APP_DEEP_LINK_SCHEME") ?: "lxmusic"

def escapeBuildConfigString = { String value -> value.replace('\\', '\\\\').replace('"', '\\"') }

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.lxwalnut.music.mobile"
    defaultConfig {
        applicationId appPackageName
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode verCode
        versionName verName
        manifestPlaceholders = [
            appProviderAuthority: appProviderAuthority,
            appWidgetActionPrefix: appWidgetActionPrefix,
            appDeepLinkScheme: appDeepLinkScheme,
        ]
        buildConfigField "String", "APP_PROVIDER_AUTHORITY", "\"${escapeBuildConfigString(appProviderAuthority)}\""
        buildConfigField "String", "APP_WIDGET_ACTION_PREFIX", "\"${escapeBuildConfigString(appWidgetActionPrefix)}\""
        buildConfigField "String", "APP_DEEP_LINK_SCHEME", "\"${escapeBuildConfigString(appDeepLinkScheme)}\""
        resValue "string", "shortcut_recognition_uri", "${appDeepLinkScheme}://recognition"
        resValue "string", "shortcut_setting_uri", "${appDeepLinkScheme}://nav?target=setting"
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk true
            include (*reactNativeArchitectures())
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            } else {
                def keystorePropertiesFile = rootProject.file("keystore.properties")
                def keystoreProperties = new Properties()
                if (keystorePropertiesFile.exists()) {
                    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                }
                if (keystoreProperties.containsKey('MYAPP_UPLOAD_STORE_FILE')) {
                    storeFile file(keystoreProperties['MYAPP_UPLOAD_STORE_FILE'])
                    storePassword keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD']
                    keyAlias keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS']
                    keyPassword keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD']
                }
            }
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".dev"
            manifestPlaceholders = [
                appProviderAuthority: "${appPackageName}.dev.provider",
                appWidgetActionPrefix: "${appPackageName}.dev.widget",
                appDeepLinkScheme: appDeepLinkScheme,
            ]
            buildConfigField "String", "APP_PROVIDER_AUTHORITY", "\"${escapeBuildConfigString("${appPackageName}.dev.provider")}\""
            buildConfigField "String", "APP_WIDGET_ACTION_PREFIX", "\"${escapeBuildConfigString("${appPackageName}.dev.widget")}\""
        }
        release {
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "